apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: drift-alertmanager
  namespace: mlops
spec:
  service:
    ports:
    - port: 12000
      targetPort: 12000
  webhook:
    # Alertmanager fires here when drift_psi_max > 0.2
    drift-alert:
      port: "12000"
      endpoint: /trigger-retrain
      method: POST
