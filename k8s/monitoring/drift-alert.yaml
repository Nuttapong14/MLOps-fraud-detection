---
# Prometheus AlertManager rules for model drift and serving health
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: fraud-detector-alerts
  namespace: monitoring
  labels:
    app: fraud-detector
    release: kube-prometheus-stack
spec:
  groups:
  - name: fraud-detector.drift
    interval: 5m
    rules:

    - alert: ModelDriftDetected
      expr: drift_psi_max > 0.2
      for: 5m
      labels:
        severity: warning
        team: mlops
      annotations:
        summary: "Data drift detected in fraud-detector model"
        description: >
          Max PSI score {{ $value | humanize }} exceeds threshold 0.2.
          Automated retraining will be triggered via Argo Events.
        runbook_url: "https://github.com/your-org/mlops-fraud-gke/wiki/drift-runbook"

    - alert: ModelDriftCritical
      expr: drift_psi_max > 0.5
      for: 2m
      labels:
        severity: critical
        team: mlops
      annotations:
        summary: "Critical data drift — fraud model may be unreliable"
        description: >
          Max PSI score {{ $value | humanize }} exceeds critical threshold 0.5.
          Manual review required. Retraining triggered automatically.

  - name: fraud-detector.serving
    interval: 1m
    rules:

    - alert: HighFraudRate
      expr: >
        rate(fraud_predictions_total{result="fraud"}[5m]) /
        rate(fraud_predictions_total[5m]) > 0.05
      for: 10m
      labels:
        severity: warning
        team: mlops
      annotations:
        summary: "Unusually high fraud detection rate (>5%)"
        description: >
          Fraud rate is {{ $value | humanizePercentage }} over the last 5 minutes.
          Expected baseline is ~0.17%. May indicate model drift or attack pattern.

    - alert: InferenceHighLatency
      expr: >
        histogram_quantile(0.99,
          rate(fraud_prediction_duration_seconds_bucket[5m])
        ) > 0.2
      for: 5m
      labels:
        severity: warning
        team: mlops
      annotations:
        summary: "Fraud detector p99 latency > 200ms"
        description: "p99 latency is {{ $value | humanizeDuration }}. SLO is 200ms."

    - alert: InferenceErrorRate
      expr: >
        rate(http_requests_total{status=~"5.."}[5m]) /
        rate(http_requests_total[5m]) > 0.01
      for: 2m
      labels:
        severity: critical
        team: mlops
      annotations:
        summary: "Fraud detector error rate > 1%"
        description: "Error rate is {{ $value | humanizePercentage }}. Check pod logs."
